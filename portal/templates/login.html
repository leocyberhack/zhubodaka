{% extends "base.html" %}

{% block title %}登录 | 主播排班录入系统{% endblock %}

{% block content %}
  <section class="grid-two">
    <article class="card auth-card">
      <div class="card-head">
        <p class="eyebrow">Sign In</p>
        <h2>登录</h2>
        <p>主播使用管理员分配的账号密码登录后录入排班。</p>
      </div>
      <form method="post" class="form-grid">
        <label>
          <span>账号</span>
          <input type="text" name="username" placeholder="请输入账号" required>
        </label>
        <label>
          <span>密码</span>
          <input type="password" name="password" placeholder="请输入密码" required>
        </label>
        <button type="submit" class="primary-button">登录</button>
      </form>
    </article>

    <article class="card auth-card accent-card">
      <div class="card-head">
        <p class="eyebrow">Bootstrap</p>
        <h2>管理员初始化</h2>
        {% if show_bootstrap_register %}
          <p>当前系统还没有任何账号。初始化后会自动创建固定管理员账号 <strong>admin</strong>。</p>
          <form method="post" action="{{ url_for('portal.bootstrap_admin') }}" class="form-grid">
            <label>
              <span>管理员密码</span>
              <input type="password" name="password" placeholder="至少 6 位" required>
            </label>
            <button type="submit" class="primary-button">创建管理员账号</button>
          </form>
        {% else %}
          <p>系统已经初始化。公开注册按钮已关闭，后续账号只能由管理员创建。</p>
        {% endif %}
      </div>
    </article>
  </section>
{% endblock %}
