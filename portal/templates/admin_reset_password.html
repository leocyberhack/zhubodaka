{% extends "base.html" %}

{% block title %}重置密码 | 主播排班录入系统{% endblock %}

{% block content %}
  <section class="card">
    <div class="action-row">
      <a class="ghost-button inline-button" href="{{ url_for('portal.admin_users') }}">返回账号管理</a>
      <a class="ghost-button inline-button" href="{{ url_for('portal.dashboard') }}">返回首页</a>
    </div>
  </section>

  <section class="card narrow-card">
    <div class="card-head">
      <p class="eyebrow">Reset Password</p>
      <h2>重置账号密码</h2>
      <p>账号：<strong>{{ user.username }}</strong>，主播名：<strong>{{ user.anchor_name }}</strong></p>
    </div>
    <form method="post" class="form-grid">
      <label class="full-width">
        <span>新密码</span>
        <input type="text" name="password" placeholder="请输入新的登录密码" required>
      </label>
      <div class="action-row full-width">
        <button type="submit" class="primary-button">保存新密码</button>
        <a class="ghost-button inline-button" href="{{ url_for('portal.admin_users') }}">取消</a>
      </div>
    </form>
  </section>
{% endblock %}
